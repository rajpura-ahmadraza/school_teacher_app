name: school_teacher_app
description: School Management System - Teacher Mobile App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP & Networking
  dio: ^5.9.2

  # State Management - GetX
  get: ^4.6.6

  # State Management - Riverpod
  flutter_riverpod: ^2.5.1

  # Routing - GoRouter
  go_router: ^14.2.0

  # Secure Storage (JWT)
  flutter_secure_storage: ^10.3.0

  # Charts & Data Viz
  fl_chart: ^1.2.0

  # Images
  cached_network_image: ^3.4.1

  # File handling
  file_picker: ^11.0.2
  image_picker: ^1.2.2

  # Date & Time
  intl: ^0.20.2

  # Animations
  lottie: ^3.3.3
  shimmer: ^3.0.0
  animate_do: ^5.1.0

  # UI Components
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^2.0.1
  flutter_slidable: ^4.0.3

  # Notifications
  flutter_local_notifications: ^21.0.0
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  device_info_plus: ^12.4.0

  # Utils
  shared_preferences: ^2.5.5
  connectivity_plus: ^7.1.1
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  open_file: ^3.5.11
  timeago: ^3.7.1

  cupertino_icons: ^1.0.9
  gal: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
